      # scripts/build/build-engine.sh for native Apple Silicon builds, then `fly deploy --build-only --push
      # --image-label <label>` and `fly machine update --image <ref>` per
      # the volume-pinned shard pattern from pax-sharded-spike. Never
      # local-Docker on developer Macs (43-min Rosetta trap).
      - name: TODO — deploy
        run: |
          echo "deploy-shards: stub. M-fly will fill this in."
          echo "Required secret: FLY_API_TOKEN_SHARDS"
          echo "Target app:     pax-backend-shards"
