app = "pax-backend-driver"
primary_region = "iad"
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]
  dockerfile = "testing/driver-image/Dockerfile"

[env]
  NODE_ENV = "production"
  PAX_ENVIRONMENT = "production"
  PAX_OBSERVABILITY = "buffer"
  PAX_VECTOR_PROFILE = "driver"
  PAX_CONTROL_URL = "https://pax-backend-control.fly.dev"
  PAX_ROUTER_URL = "https://pax-backend-control.fly.dev"
  PAX_HISTORY_PATH = "/data/history/history.jsonl"
  PAX_DRIVER_HEALTH_BIND = "0.0.0.0:9090"

[checks.driver]
  type = "http"
  port = 9090
  method = "GET"
  path = "/health"
  interval = "30s"
  timeout = "2s"
  grace_period = "15s"

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 4
