# Deploys orchestration/ to pax-backend-control.
#
# Scope: this workflow uses FLY_API_TOKEN_CONTROL, which has no
# permission on pax-backend-shards or pax-backend-driver.
name: deploy-control

on:
  push:
    branches: [main]
    paths:
      - "orchestration/**"
      - "shared/ipc-protocol/**"
      - ".github/workflows/deploy-control.yml"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: deploy-control
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

