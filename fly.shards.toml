app = "pax-backend-shards"
primary_region = "iad"
kill_signal = "SIGTERM"
kill_timeout = "60s"

[build]
  dockerfile = "runtime/shard-image/Dockerfile"

[env]
  NODE_ENV = "production"
  PAX_ENVIRONMENT = "production"
  PAX_OBSERVABILITY = "on"
  PAX_VECTOR_PROFILE = "shards"
  PAX_SHARD_ID = "shard-fly-iad-1"
  PAX_SHARD_PUBLIC_URL = "https://pax-backend-shards.fly.dev"
  PAX_BROKER_BIND = ":::7700"
  PAX_BROKER_WS_PATH = "/gateway"
  PAX_RUNNER_KIND = "ivm"
  PAX_RUNNER_PROCESS_COUNT = "4"
  PAX_BROKER_MAX_ACTIVE_GAMES = "1000"
  PAX_CPU_MS_PER_TICK_LIMIT = "10000"
  PAX_API_GATEWAY_URL = "http://pax-backend-control.internal:9081/invoke"

[[services]]
  protocol = "tcp"
  internal_port = 7700
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [services.concurrency]
    type = "connections"
    hard_limit = 1200
    soft_limit = 1000

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "30s"

[[vm]]
  memory = "8gb"
  cpu_kind = "performance"
  cpus = 4
