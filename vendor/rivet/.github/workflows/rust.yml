  # deny:
  #   name: Deny
  #   runs-on: ubuntu-latest
  #   needs: changes
  #   if: needs.changes.outputs.rust == 'true'
  #   steps:
  #     - uses: actions/checkout@v4
  #     - name: cargo deny
  #       uses: EmbarkStudios/cargo-deny-action@v1
  #       with:
  #         rust-version: "1.88.0"

  # This job always runs and should be the required status check
  status-check:
    name: Rust CI Status
    runs-on: ubuntu-latest
    needs:
      [
        changes,
        fmt,
        check,
        ups_lanes_conformance,
        tunnel_v2_conformance,
        executor_lanes_conformance,
        routing_directory_conformance,
      ]
    if: always()
    steps:
      - name: Check job status
        run: |
          # If checked code didn't change, consider it a pass
          if [ "${{ needs.changes.outputs.rust }}" != "true" ] && [ "${{ needs.changes.outputs.conformance }}" != "true" ]; then
            echo "No Rust or TypeScript conformance changes detected, skipping checks"
            exit 0
          fi

          # If checked code changed, verify all jobs passed
          if [ "${{ needs.fmt.result }}" == "failure" ] || \
             [ "${{ needs.check.result }}" == "failure" ] || \
             [ "${{ needs.ups_lanes_conformance.result }}" == "failure" ] || \
             [ "${{ needs.tunnel_v2_conformance.result }}" == "failure" ] || \
             [ "${{ needs.executor_lanes_conformance.result }}" == "failure" ] || \
             [ "${{ needs.routing_directory_conformance.result }}" == "failure" ]; then
            echo "One or more required jobs failed"
            exit 1
          fi

          echo "All required checks passed"
