# Deploys runtime/ to pax-backend-shards.
#
# Scope: this workflow uses FLY_API_TOKEN_SHARDS, which has no permission
# on pax-backend-control or pax-backend-driver. If it ever needs broader
# scope, that's a sign the layout has cracked — stop and re-read
# docs-next/vision/boundaries-and-layers.md.
name: deploy-shards

on:
  push:
    branches: [main]
    paths:
      - "runtime/**"
      - "vendor/rivet/**"
      - "shared/ipc-protocol/**"
      - ".github/workflows/deploy-shards.yml"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: deploy-shards
  cancel-in-progress: false   # never cancel a deploy mid-roll

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

